<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rede de Confianca - Blockchain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="top-bar">
  <label>MSG:</label>
  <input type="text" id="msg-input" value="HELLO" maxlength="20" placeholder="A-Z only">
  <div class="sep"></div>
  <label>N':</label>
  <input type="number" id="n-shift" value="3" min="0" max="25" title="Deslocamento base (0–25)">
  <label>P:</label>
  <input type="number" id="p-key" value="5" min="1" max="25" title="Fator da chave composta (1–25)">
  <label>M:</label>
  <input type="number" id="m-key" value="2" min="0" max="25" title="Coeficiente multiplicativo (0–25)">
  <div class="sep"></div>
  <button class="primary" id="btn-send">▶ Propagar</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<div id="legend">
  <div class="leg"><div class="dot" style="background:var(--green)"></div> Origem</div>
  <div class="leg"><div class="dot" style="background:var(--amber)"></div> Transmitindo</div>
  <div class="leg"><div class="dot" style="background:var(--blue)"></div> Recebido</div>
  <div class="leg"><div class="dot" style="background:var(--gray-node)"></div> Pendente</div>
  <div class="leg"><div class="dot" style="background:var(--red)"></div> Selecionado</div>
  <div class="leg-hint">Por Alan, Dryelle, Naban, Saulo e Gabriel | Clique no nó para selecionar origem</div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>
  <div id="panel">
    <div id="panel-tabs">
      <button class="tab active" data-tab="chain">Blockchain</button>
      <button class="tab" data-tab="node">Nó</button>
      <button class="tab" data-tab="log">Log</button>
    </div>
    <div id="panel-content">
      <div id="panel-body"></div>
    </div>
  </div>
</div>

<div id="status-bar">
  Origem: <span class="val" id="s-sel">—</span>
  &nbsp;|&nbsp;
  Cobertos: <span class="val" id="s-cov">0/9</span>
  &nbsp;|&nbsp;
  Blocos totais: <span class="val" id="s-blocks">0</span>
  &nbsp;|&nbsp;
  Disseminações: <span class="val" id="s-msgs">0</span>
  &nbsp;|&nbsp;
  Latência: ln(w+1) × Δt
</div>

<script src="main.js"></script>
</body>
</html>
